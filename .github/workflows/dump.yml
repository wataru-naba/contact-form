name: Dump
on: push
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 #ローカルアクション呼出し前
      - uses: ./.github/actions/dump
        id: dump
        with:
          enable-env: 'true'
      - run: echo "${DATE}"
        env:
          DATE: ${{ steps.dump.outputs.dumped-date }}